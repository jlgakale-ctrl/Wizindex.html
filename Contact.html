<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEV Autos | Contact</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific alignment for the centered contact layout */
        .contact-container {
            padding: 180px 10% 100px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .contact-subtitle {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #888888;
            margin-bottom: 15px;
        }

        .contact-channels {
            margin-top: 60px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .contact-method {
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 30px;
        }

        .method-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #555555;
            margin-bottom: 10px;
        }

        .method-value {
            font-size: 2rem;
            font-weight: 300;
            color: #ffffff;
            text-decoration: none;
            letter-spacing: 2px;
            transition: color 0.3s ease;
        }

        .method-value:hover {
            color: #888888;
        }

        @media (max-width: 768px) {
            .method-value {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">ZEV Autos</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="cars.html">Cars</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </header>

    <main class="contact-container">
        <p class="contact-subtitle">Direct Concierge</p>
        <h1 class="car-title">Get In Touch</h1>
        
        <div class="contact-channels">
            <!-- Phone Method -->
            <div class="contact-method">
                <div class="method-label">Telephone</div>
                <a href="tel:+15550199" class="method-value">+1 (555) 0199</a>
            </div>

            <!-- Email Method -->
            <div class="contact-method">
                <div class="method-label">Digital Inquiries</div>
                <a href="mailto:inquiries@zevautos.com" class="method-value">inquiries@zevautos.com</a>
            </div>
        </div>
    </main>

</body>
</html>
