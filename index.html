<!DOCTYPE html>

<head>

/* NAVBAR (clean original style) */

    position: sticky;
    top: 0;
}

.nav-wrapper {
    max-width: 1000px;
    margin: auto;
    padding: 0 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: 20px;
    font-weight: bold;
}

.nav-links {
    display: flex;
    gap: 20px;
    list-style: none;
}

.nav-links a {
    text-decoration: none;
    color: black;
    font-weight: bold;
}

.nav-links a:hover {
    color: #c62a2f;
}

.call-btn {
    background: #c62a2f;
    color: white;
    padding: 8px 14px;
    border-radius: 6px;
    text-decoration: none;

/* HERO */
.hero {
    text-align: center;
    padding: 80px 20px;
    background: #0f172a;
    color: white;

<body>

<!-- NAVBAR -->

    <div class="nav-wrapper">

        <div class="logo">MY WEBSITE</div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>

            <li><a href="#">About</a></li>

    <p>Find your perfect car easily</p>
</section>

</body>
</html>
