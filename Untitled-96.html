<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEV Autos | Contact</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #0b0b0b;
            color: #ffffff;
            padding-top: 100px;
        }

        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 10%;
        }

        .logo {
            font-size: 1.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-decoration: none;
            color: #ffffff;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-links a {
            color: #cccccc;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #ffffff;
        }

        .contact-section {
            padding: 100px 10%;
            text-align: center;
        }

        .section-title {
            font-size: 2.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        .contact-info {
            margin-bottom: 40px;
        }

        .contact-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #888888;
            margin-bottom: 10px;
        }

        .contact-detail {
            font-size: 1.5rem;
            color: #ffffff;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">ZEV Autos</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="cars.html">Cars</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </header>

    <section class="contact-section">
        <h2 class="section-title">Connect With Us</h2>
        
        <div class="contact-info">
            <p class="contact-label">Phone</p>
            <a href="tel:+15550199" class="contact-detail">+1 (555) 0199</a>
        </div>

        <div class="contact-info">
            <p class="contact-label">Email</p>
            <a href="mailto:inquiries@zevautos.com" class="contact-detail">inquiries@zevautos.com</a>
        </div>
    </section>

</body>
</html>
